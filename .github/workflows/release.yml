# Builds installers and uploads them to the GitHub Release.
# Runs on draft creation (assets on draft) and again when you publish (refresh/re-upload).
# Prereq: package.json "version" must match the release tag (e.g. tag v1.2.3 → version 1.2.3).

name: Release

on:
  release:
    types: [created, published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npx electron-builder --win portable --publish always
          - os: macos-latest
            cmd: npx electron-builder --mac dmg --publish always

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Use MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare .env for packaging
        shell: bash
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi

      - name: Install dependencies
        run: npm ci --foreground-scripts --no-audit

      - name: Generate macOS chrome.icns from chrome.ico
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -f assets/chrome.icns ]; then
            exit 0
          fi
          set -euo pipefail
          ICO=assets/chrome.ico
          OUT=/tmp/Umbra.iconset
          rm -rf "$OUT"
          mkdir -p "$OUT"
          sips -s format png "$ICO" --out /tmp/umbra-icon-src.png
          sips -z 1024 1024 /tmp/umbra-icon-src.png --out /tmp/umbra-icon-1024.png
          BASE=/tmp/umbra-icon-1024.png
          sips -z 16 16     "$BASE" --out "$OUT/icon_16x16.png"
          sips -z 32 32     "$BASE" --out "$OUT/icon_16x16@2x.png"
          sips -z 32 32     "$BASE" --out "$OUT/icon_32x32.png"
          sips -z 64 64     "$BASE" --out "$OUT/icon_32x32@2x.png"
          sips -z 128 128   "$BASE" --out "$OUT/icon_128x128.png"
          sips -z 256 256   "$BASE" --out "$OUT/icon_128x128@2x.png"
          sips -z 256 256   "$BASE" --out "$OUT/icon_256x256.png"
          sips -z 512 512   "$BASE" --out "$OUT/icon_256x256@2x.png"
          sips -z 512 512   "$BASE" --out "$OUT/icon_512x512.png"
          sips -z 1024 1024 "$BASE" --out "$OUT/icon_512x512@2x.png"
          iconutil -c icns "$OUT" -o assets/chrome.icns

      - name: Build and publish (${{ github.event.action }})
        run: ${{ matrix.cmd }}
