# Matrix builds: Windows portable (.exe) + macOS DMG.
# Artifacts: umbra-windows-latest (Umbra.exe), umbra-macos-latest (*.dmg only —
# not the whole dist/ tree, so downloads stay small).
#
# Windows: node-window-manager pulls in extract-file-icon (node-gyp). First npm ci
# can take several minutes compiling native code. Do not cancel early; "Terminate
# batch job" in logs usually means the run was stopped manually or by a short timeout.

name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
          - os: macos-latest
            build_cmd: npm run build:mac

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    env:
      # Only mac runners get these (runner.os); Windows leaves them empty = unsigned win build unchanged.
      CSC_LINK: ${{ runner.os == 'macOS' && secrets.MAC_CERT_P12_BASE64 || '' }}
      CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CERT_PASSWORD || '' }}
      APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # So node-gyp can find MSVC (extract-file-icon, node-window-manager, postinstall rebuilds).
      - name: Use MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # electron-builder extraResources copies .env; repo only ships .env.example
      - name: Prepare .env for packaging
        shell: bash
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env 2>/dev/null || touch .env
          fi

      # --foreground-scripts: avoid parallel lifecycle scripts (fewer Windows EPERM cleanups).
      - name: Install dependencies
        run: npm ci --foreground-scripts --no-audit

      # package.json references assets/chrome.icns; only chrome.ico is in repo.
      # sips is unreliable when reading .ico repeatedly; decode once to PNG then resize.
      - name: Generate macOS chrome.icns from chrome.ico
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -f assets/chrome.icns ]; then
            exit 0
          fi
          set -euo pipefail
          ICO=assets/chrome.ico
          OUT=/tmp/Umbra.iconset
          rm -rf "$OUT"
          mkdir -p "$OUT"
          sips -s format png "$ICO" --out /tmp/umbra-icon-src.png
          sips -z 1024 1024 /tmp/umbra-icon-src.png --out /tmp/umbra-icon-1024.png
          BASE=/tmp/umbra-icon-1024.png
          sips -z 16 16     "$BASE" --out "$OUT/icon_16x16.png"
          sips -z 32 32     "$BASE" --out "$OUT/icon_16x16@2x.png"
          sips -z 32 32     "$BASE" --out "$OUT/icon_32x32.png"
          sips -z 64 64     "$BASE" --out "$OUT/icon_32x32@2x.png"
          sips -z 128 128   "$BASE" --out "$OUT/icon_128x128.png"
          sips -z 256 256   "$BASE" --out "$OUT/icon_128x128@2x.png"
          sips -z 256 256   "$BASE" --out "$OUT/icon_256x256.png"
          sips -z 512 512   "$BASE" --out "$OUT/icon_256x256@2x.png"
          sips -z 512 512   "$BASE" --out "$OUT/icon_512x512.png"
          sips -z 1024 1024 "$BASE" --out "$OUT/icon_512x512@2x.png"
          iconutil -c icns "$OUT" -o assets/chrome.icns

      - name: Build
        run: ${{ matrix.build_cmd }}

      # Upload installable outputs only. Full dist/ includes unpacked .app (duplicates DMG) and bloats the zip.
      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: umbra-macos-latest
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: umbra-windows-latest
          path: dist/Umbra.exe
          if-no-files-found: error
